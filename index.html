<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Community Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #0088cc;
            --danger-color: #e74c3c;
            --text-color: #ffffff;
            --text-sub: #aaaaaa;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 70px;
        }

        .header {
            padding: 15px;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2a2a2a;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #333;
            object-fit: cover;
        }

        .user-info h4 { margin: 0; font-size: 16px; }
        .user-info p { margin: 2px 0 0 0; font-size: 12px; color: var(--text-sub); }

        .container { padding: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .post-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #2a2a2a;
        }

        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .post-author { font-weight: bold; font-size: 14px; }
        
        .post-media {
            width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 10px;
            object-fit: contain;
            background: #000;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--card-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #2a2a2a;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .nav-btn.active { color: var(--accent-color); font-weight: bold; }

        input, textarea {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 10px;
        }

        .btn-primary {
            width: 100%;
            padding: 10px;
            background: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-delete {
            background: var(--danger-color);
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .file-label {
            display: block;
            padding: 10px;
            background: #2a2a2a;
            border: 1px dashed #555;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="header">
        <img id="user-avatar" class="avatar" src="https://via.placeholder.com/45" alt="Avatar">
        <div class="user-info">
            <h4 id="user-name">Загрузка...</h4>
            <p id="user-handle">@username</p>
        </div>
    </div>

    <div class="container">
        
        <!-- Вкладка: Новости -->
        <div id="tab-news" class="tab-content active">
            <h3>📢 Главная Лента Новостей</h3>
            <div id="admin-posts-list">
                <p style="color:var(--text-sub)">Загрузка новостей...</p>
            </div>
        </div>

        <!-- Вкладка: Друзья -->
        <div id="tab-friends" class="tab-content">
            <h3>🤝 Найти Друга</h3>
            <input type="text" id="search-user-input" placeholder="Введите Username или ID...">
            <button class="btn-primary" onclick="searchProfile()">Найти профиль</button>
        </div>

        <!-- Вкладка: Профиль -->
        <div id="tab-profile" class="tab-content">
            <h3 id="profile-title">Мой Профиль</h3>

            <div id="create-post-block" class="post-card">
                <h4>Создать публикацию</h4>
                <textarea id="post-text" rows="3" placeholder="Напишите сообщение..."></textarea>

                <label class="file-label" for="file-input">
                    📁 Выбрать фото/видео (до 10 МБ)
                </label>
                <input type="file" id="file-input" accept="image/*,video/*" style="display:none;" onchange="updateFileName()">
                <div id="selected-file-name" style="font-size:12px; color:var(--text-sub); margin-bottom:10px;"></div>

                <button class="btn-primary" id="publish-btn" onclick="publishPost()">Опубликовать</button>
            </div>

            <h4>Публикации профиля</h4>
            <div id="user-posts-list">
                <p style="color:var(--text-sub)">Пока нет публикаций</p>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" onclick="switchTab('news', this)">📢 Новости</button>
        <button class="nav-btn" onclick="switchTab('friends', this)">🤝 Друзья</button>
        <button class="nav-btn" onclick="switchTab('profile', this, true)">👤 Профиль</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDummyKeyForFirebaseApp12345",
            authDomain: "roblox-mini-app.firebaseapp.com",
            projectId: "roblox-mini-app",
            storageBucket: "roblox-mini-app.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };
        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();

        const BACKEND_URL = "https://roblox-mini-app.onrender.com";

        const tg = window.Telegram.WebApp;
        tg.expand();

        const currentUser = tg.initDataUnsafe?.user || {
            id: 6122432326,
            first_name: "Пользователь",
            username: "MARKFREDDIE_tg"
        };

        let isUserAdmin = false;

        document.addEventListener("DOMContentLoaded", async () => {
            document.getElementById("user-name").innerText = currentUser.first_name || "Пользователь";
            document.getElementById("user-handle").innerText = currentUser.username ? `@${currentUser.username}` : `ID: ${currentUser.id}`;
            if (currentUser.photo_url) {
                document.getElementById("user-avatar").src = currentUser.photo_url;
            }

            await checkAdminRights();
            loadAllNews();
        });

        async function checkAdminRights() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/check-admin/${currentUser.id}`);
                const data = await res.json();
                isUserAdmin = data.is_admin;
            } catch (err) {
                isUserAdmin = false;
            }
        }

        function updateFileName() {
            const input = document.getElementById("file-input");
            const nameContainer = document.getElementById("selected-file-name");
            if (input.files.length > 0) {
                nameContainer.innerText = `Выбран файл: ${input.files[0].name}`;
            }
        }

        function switchTab(tabName, btnElement, isOwnProfile = false) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(`tab-${tabName}`).classList.add('active');
            btnElement.classList.add('active');

            if (tabName === 'news') loadAllNews();

            if (isOwnProfile) {
                document.getElementById("profile-title").innerText = "Мой Профиль";
                document.getElementById("create-post-block").style.display = "block";
                loadUserPosts(currentUser.id);
            }
        }

        async function uploadMedia(file) {
            if (file.size > 10 * 1024 * 1024) {
                alert("Ошибка: Файл больше 10 МБ!");
                return null;
            }
            const ref = storage.ref(`user_uploads/${Date.now()}_${file.name}`);
            await ref.put(file);
            return await ref.getDownloadURL();
        }

        async function publishPost() {
            const text = document.getElementById("post-text").value.trim();
            const fileInput = document.getElementById("file-input");
            const publishBtn = document.getElementById("publish-btn");

            if (!text && fileInput.files.length === 0) return alert("Заполните поле!");

            publishBtn.innerText = "Загрузка...";
            publishBtn.disabled = true;

            let mediaUrl = null;
            let mediaType = null;

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                mediaUrl = await uploadMedia(file);
                if (mediaUrl) mediaType = file.type.startsWith("video") ? "video" : "image";
            }

            await fetch(`${BACKEND_URL}/api/posts`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: currentUser.id,
                    author_name: currentUser.first_name || "Аноним",
                    text: text,
                    media_url: mediaUrl,
                    media_type: mediaType
                })
            });

            publishBtn.innerText = "Опубликовать";
            publishBtn.disabled = false;
            document.getElementById("post-text").value = "";
            document.getElementById("file-input").value = "";
            document.getElementById("selected-file-name").innerText = "";
            loadUserPosts(currentUser.id);
        }

        async function loadAllNews() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/posts`);
                const posts = await res.json();
                renderPosts(posts, document.getElementById("admin-posts-list"));
            } catch (e) {
                document.getElementById("admin-posts-list").innerHTML = `<p style="color:var(--text-sub)">Ошибка загрузки новостей</p>`;
            }
        }

        async function loadUserPosts(userId) {
            try {
                const res = await fetch(`${BACKEND_URL}/api/posts/${userId}`);
                const posts = await res.json();
                renderPosts(posts, document.getElementById("user-posts-list"));
            } catch (e) {
                document.getElementById("user-posts-list").innerHTML = `<p style="color:var(--text-sub)">Ошибка загрузки публикаций</p>`;
            }
        }

        function renderPosts(posts, container) {
            if (!posts || !posts.length) {
                container.innerHTML = `<p style="color:var(--text-sub)">Публикаций нет</p>`;
                return;
            }

            container.innerHTML = posts.map((p, index) => {
                let mediaHtml = "";
                if (p.media_url) {
                    if (p.media_type === "video") {
                        mediaHtml = `<video class="post-media" controls src="${p.media_url}"></video>`;
                    } else {
                        mediaHtml = `<img class="post-media" src="${p.media_url}">`;
                    }
                }

                let deleteBtnHtml = isUserAdmin ? `<button class="btn-delete" onclick="deletePost(${index})">🗑️ Удалить</button>` : '';

                return `
                    <div class="post-card">
                        <div class="post-header">
                            <span class="post-author">${p.author_name}</span>
                            ${deleteBtnHtml}
                        </div>
                        <p>${p.text}</p>
                        ${mediaHtml}
                    </div>
                `;
            }).join('');
        }

        async function deletePost(index) {
            if (!confirm("Удалить этот пост?")) return;
            const res = await fetch(`${BACKEND_URL}/api/posts/${index}`, { method: "DELETE" });
            if (res.ok) {
                alert("Пост удален!");
                loadAllNews();
            }
        }

        function searchProfile() {
            const query = document.getElementById("search-user-input").value.trim();
            if (!query) return alert("Введите username или ID");
            alert(`Поиск пользователя: ${query}`);
        }
    </script>
</body>
</html>
