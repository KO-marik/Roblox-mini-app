<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Hub Catalog</title>
    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0d0e12;
            color: #e2e8f0;
            padding: 16px;
            padding-bottom: 30px;
            overflow-x: hidden;
        }

        /* Шапка приложения */
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .header h1 {
            font-size: 24px;
            color: #ffffff;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }

        /* Навигация по тегам (Фильтр) */
        .tags-filter {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 16px;
            scrollbar-width: none;
        }
        .tags-filter::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: #3b82f6;
            color: #fff;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
            border-color: #3b82f6;
        }

        /* Сетка постов */
        .catalog-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        /* Карточка товара/новости */
        .card {
            background: #171923;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-img-container {
            width: 100%;
            height: 180px;
            background: #2d3748;
            position: relative;
            overflow: hidden;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-no-img {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #4a5568;
            font-size: 40px;
        }

        .card-body {
            padding: 16px;
        }

        .card-title {
            font-size: 17px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .card-desc {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #64748b;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 10px;
        }

        /* Модальное окно (Детали новости) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 10, 0.85);
            backdrop-filter: blur(8px);
            z-index: 999;
            display: flex;
            align-items: flex-end;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            width: 100%;
            max-height: 85vh;
            background: #131520;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            border-top: 2px solid rgba(59, 130, 246, 0.3);
            padding: 20px;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header-line {
            width: 40px;
            height: 4px;
            background: #4a5568;
            border-radius: 2px;
            margin: 0 auto 15px auto;
        }

        .modal-media-wrapper {
            width: 100%;
            max-height: 260px;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
            background: #2d3748;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: zoom-in;
            transition: opacity 0.2s;
        }

        .modal-img:active {
            opacity: 0.8;
        }

        .modal-video {
            width: 100%;
            max-height: 260px;
            border-radius: 12px;
            outline: none;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .modal-full-desc {
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.6;
            white-space: pre-wrap;
            margin-bottom: 24px;
        }

        /* Кнопки действий */
        .modal-actions {
            margin-top: 15px;
        }

        .close-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            border: none;
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            transition: background 0.2s;
        }

        .close-btn:active { background: #2563eb; }

        /* Полноэкранный просмотр фото (Lightbox) */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .lightbox-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .lightbox-img {
            max-width: 95%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader, .no-posts {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Roblox Hub Catalog</h1>
        <p>Автоматические обновления и инсайды игрового мира</p>
    </div>

    <!-- Фильтр по тегам -->
    <div class="tags-filter">
        <button class="filter-btn active" onclick="filterCategory('all')">🔥 Все</button>
        <button class="filter-btn" onclick="filterCategory('#роблокс')">#роблокс</button>
        <button class="filter-btn" onclick="filterCategory('#мм2')">#мм2</button>
        <button class="filter-btn" onclick="filterCategory('#мертвые_рельсы')">#мертвые_рельсы</button>
    </div>

    <!-- Каталог -->
    <div id="catalog" class="catalog-grid">
        <div class="loader">Загрузка каталога...</div>
    </div>

    <!-- Модальное окно новости -->
    <div id="newsModal" class="modal-overlay" onclick="closeNews()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header-line"></div>
            
            <div id="modalMediaContainer" class="modal-media-wrapper" style="display:none;"></div>
            
            <h2 id="modalTitle" class="modal-title">Заголовок новости</h2>
            <div id="modalDesc" class="modal-full-desc">Полное описание...</div>
            
            <div class="modal-actions">
                <button class="close-btn" onclick="closeNews()">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Лайтбокс для увеличения картинки на весь экран -->
    <div id="lightbox" class="lightbox-overlay" onclick="closeLightbox()">
        <div class="lightbox-close">&times;</div>
        <img id="lightboxImg" class="lightbox-img" src="" alt="Fullscreen view" onclick="event.stopPropagation()">
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const PROJECT_ID = 'roblox-mini-app';
        let allPosts = [];
        let currentFilter = 'all';

        async function fetchCatalog() {
            const url = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/roblox_catalog`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (!data.documents || data.documents.length === 0) {
                    document.getElementById('catalog').innerHTML = '<div class="no-posts">Тут пока пусто. Скоро появятся новые посты!</div>';
                    return;
                }

                allPosts = data.documents.map(doc => {
                    const fields = doc.fields;
                    const docId = doc.name.split('/').pop();
                    return {
                        id: docId,
                        name: fields.name?.stringValue || 'Без названия',
                        desc: fields.desc?.stringValue || '',
                        url: fields.url?.stringValue || '',
                        createdAt: fields.createdAt?.doubleValue || 0
                    };
                });

                allPosts.sort((a, b) => b.createdAt - a.createdAt);
                renderCatalog();
            } catch (error) {
                console.error("Ошибка:", error);
                document.getElementById('catalog').innerHTML = '<div class="no-posts">❌ Ошибка загрузки базы данных.</div>';
            }
        }

        function renderCatalog() {
            const container = document.getElementById('catalog');
            container.innerHTML = '';

            const filtered = allPosts.filter(post => {
                if (currentFilter === 'all') return true;
                const searchStr = (post.name + ' ' + post.desc).toLowerCase();
                return searchStr.includes(currentFilter.toLowerCase());
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-posts">Нет постов по этому тегу.</div>';
                return;
            }

            filtered.forEach(post => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openNews(post);

                let imgHtml = '<div class="card-no-img">🎮</div>';
                if (post.url && (post.url.startsWith('data:image') || post.url.startsWith('http'))) {
                    imgHtml = `<img class="card-img" src="${post.url}" alt="${post.name}">`;
                }

                const dateStr = post.createdAt ? new Date(post.createdAt).toLocaleDateString('ru-RU', {
                    day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
                }) : '';

                card.innerHTML = `
                    <div class="card-img-container">${imgHtml}</div>
                    <div class="card-body">
                        <div class="card-title">${post.name}</div>
                        <div class="card-desc">${post.desc}</div>
                        <div class="card-footer">
                            <span>${dateStr}</span>
                            <span style="color:#3b82f6; font-weight:bold;">🔍 Читать</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterCategory(category) {
            currentFilter = category;
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderCatalog();
        }

        function openNews(post) {
            document.getElementById('modalTitle').innerText = post.name;
            document.getElementById('modalDesc').innerText = post.desc;
            
            const mediaContainer = document.getElementById('modalMediaContainer');
            mediaContainer.innerHTML = ''; 

            if (post.url && post.url.trim() !== "") {
                mediaContainer.style.display = 'flex';
                
                if (post.url.startsWith('data:video') || post.url.endsWith('.mp4')) {
                    mediaContainer.innerHTML = `<video class="modal-video" src="${post.url}" controls playsinline></video>`;
                } else {
                    mediaContainer.innerHTML = `<img id="modalImg" class="modal-img" src="${post.url}" alt="Image" onclick="openLightbox('${post.url}')">`;
                }
            } else {
                mediaContainer.style.display = 'none';
            }

            document.getElementById('newsModal').classList.add('active');
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function closeNews() {
            document.getElementById('newsModal').classList.remove('active');
        }

        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            lightboxImg.src = src;
            lightbox.classList.add('active');
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        fetchCatalog();
    </script>
</body>
</html>
